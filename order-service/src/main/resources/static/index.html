<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mikroservis Sipariş Ekranı</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; }
        h1 { color: #2c3e50; font-size: 24px; margin-bottom: 20px; }
        button { background-color: #3498db; color: white; border: none; padding: 12px 24px; font-size: 16px; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background-color: #2980b9; }
        .result-box { margin-top: 20px; padding: 15px; border-radius: 5px; background: #ecf0f1; border-left: 5px solid #bdc3c7; text-align: left; min-height: 50px; font-weight: 500;}
        .success { border-left-color: #2ecc71; background: #e8f8f5; color: #27ae60;}
        .fallback { border-left-color: #e74c3c; background: #fdedec; color: #c0392b;}
    </style>
</head>
<body>

<div class="container">
    <h1>🛒 Sipariş ve Ürün Servisi</h1>
    <p>Aşağıdaki butona basarak Order Service üzerinden Product Service'e istek atın.</p>
    <button onclick="fetchOrders()">Siparişleri Getir</button>
    
    <div id="result" class="result-box">Sonuç bekleniyor...</div>
</div>

<script>
    function fetchOrders() {
        const resultBox = document.getElementById('result');
        resultBox.innerHTML = "Yükleniyor...";
        resultBox.className = "result-box";

        fetch('/orders')
            .then(response => response.text())
            .then(data => {
                resultBox.innerHTML = data;
                // Eğer hata mesajıysa (fallback) kırmızı, normalse yeşil yap
                if(data.includes("Şu an ürün hizmetine ulaşılamıyor") || data.includes("Hata")) {
                    resultBox.className = "result-box fallback";
                } else {
                    resultBox.className = "result-box success";
                }
            })
            .catch(error => {
                resultBox.innerHTML = "Sistem Hatası (Order Service'e ulaşılamıyor!)";
                resultBox.className = "result-box fallback";
            });
    }
</script>

</body>
</html>
